# Fix the DEPRECATED warnings by removing underscores
adapter driver ftdi
ftdi device_desc "Digilent USB Device"
ftdi vid_pid 0x0403 0x6010 
ftdi channel 0
ftdi layout_init 0x0088 0x008b

transport select jtag
adapter speed 5000

# The Artix-7 TAP
jtag newtap riscv cpu -irlen 6 -expected-id 0x13631093

# Create the target without the inline tunnel param
target create riscv.cpu riscv -chain-position riscv.cpu

# Configure the tunnel separately (0x2 = USER2)
riscv.cpu riscv use_bscan_tunnel 0x2

init
# Explicitly tell it to look for the CPU now that the tunnel is open
riscv.cpu examine_deferred